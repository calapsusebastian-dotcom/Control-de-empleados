    function formatDur(min) {
      if (min <= 0) return '—';
      const h = Math.floor(min / 60), m = min % 60;
      if (h > 0 && m > 0) return `${h}h ${m}m`;
      if (h > 0) return `${h}h`;
      return `${m}m`;
    }

    function histRow(a, showTask) {
      const p   = personas.find(x => x.id === a.personaId);
      const t   = tareas.find(x => x.id === a.tarea);
      const dur = Math.max(0, toMin(a.horaFin) - toMin(a.horaInicio));
      const st  = asigStatus(a);
      const badge = st === 'en-curso'
        ? `<span class="hist-badge hist-badge-curso">🟠 En curso</span>`
        : st === 'pendiente'
        ? `<span class="hist-badge hist-badge-pending">🔵 Pendiente</span>`
        : `<span class="hist-badge hist-badge-done">✅ Completado</span>`;

      const taskCol = showTask ? `
        <div class="hist-row-task">
          <span class="hist-task-icon">${t?.icon||'📋'}</span>
          ${esc(t?.nombre||'Tarea')}
        </div>` : '';

      const dateCol = !showTask ? `
        <div class="hist-row-date">${new Date(a.fecha+'T12:00:00').toLocaleDateString('es-CO',{day:'numeric',month:'short'})}</div>` : '';

      return `
        <div class="hist-row ${st==='en-curso'?'hist-row-active':''}">
          <div class="hist-row-av" style="background:${p?.color||'#999'}">${ini(p?.nombre||'?')}</div>
          <div class="hist-row-person">${esc(p?.nombre||'Sin nombre')}</div>
          ${taskCol}${dateCol}
          <div class="hist-row-time">${fmt(a.horaInicio)} → ${fmt(a.horaFin)}</div>
          <div class="hist-duration">${formatDur(dur)}</div>
          ${badge}
        </div>`;
    }

    function renderHistorial() {
      let list = [...asignaciones];
      if (histFilters.personaId)  list = list.filter(a => a.personaId === histFilters.personaId);
      if (histFilters.fechaDesde) list = list.filter(a => a.fecha >= histFilters.fechaDesde);
      if (histFilters.fechaHasta) list = list.filter(a => a.fecha <= histFilters.fechaHasta);

      list.sort((a,b) => b.fecha !== a.fecha
        ? b.fecha.localeCompare(a.fecha)
        : toMin(a.horaInicio) - toMin(b.horaInicio));

      const hasFiltros = histFilters.personaId || histFilters.fechaDesde || histFilters.fechaHasta;

      // ── Barra de filtros + toggle ──
      document.getElementById('histFilterBar').innerHTML = `
        <div class="hist-filter-bar">
          <div class="hist-group-toggle">
            <button class="hist-gtab ${histGroupBy==='tarea'?'active':''}"
                    onclick="histGroupBy='tarea';renderHistorial()">Por tarea</button>
            <button class="hist-gtab ${histGroupBy==='fecha'?'active':''}"
                    onclick="histGroupBy='fecha';renderHistorial()">Por fecha</button>
          </div>
          <div style="width:1px;height:20px;background:var(--border);flex-shrink:0;"></div>
          <select class="hist-select" onchange="histFilters.personaId=this.value;renderHistorial()">
            <option value="">👤 Todos</option>
            ${personas.map(p=>`<option value="${p.id}" ${histFilters.personaId===p.id?'selected':''}>${esc(p.nombre)}</option>`).join('')}
          </select>
          <div class="hist-date-range">
            <input type="date" class="hist-date-input" value="${histFilters.fechaDesde}"
                   onchange="histFilters.fechaDesde=this.value;renderHistorial()">
            <span style="color:var(--text-3);font-size:12px;">→</span>
            <input type="date" class="hist-date-input" value="${histFilters.fechaHasta}"
                   onchange="histFilters.fechaHasta=this.value;renderHistorial()">
          </div>
          ${hasFiltros ? `<button class="hist-clear-btn"
            onclick="histFilters={personaId:'',fechaDesde:'',fechaHasta:''};renderHistorial()">× Limpiar</button>` : ''}
        </div>`;

      // ── Resumen general ──
      const totalMin = list.reduce((s,a) => s + Math.max(0, toMin(a.horaFin)-toMin(a.horaInicio)), 0);
      const dias     = new Set(list.map(a => a.fecha)).size;
      document.getElementById('histSummary').innerHTML = list.length ? `
        <div class="hist-summary">
          <span><strong>${list.length}</strong> asignacion${list.length!==1?'es':''}</span>
          <span class="hist-stat-sep">·</span>
          <span><strong>${formatDur(totalMin)}</strong> trabajadas</span>
          <span class="hist-stat-sep">·</span>
          <span><strong>${dias}</strong> día${dias!==1?'s':''}</span>
        </div>` : '';

      if (!list.length) {
        document.getElementById('histContent').innerHTML = `
          <div class="hist-empty">
            <div style="font-size:36px;margin-bottom:10px;">📋</div>
            <div>Sin asignaciones${hasFiltros?' con estos filtros':''}</div>
          </div>`;
        return;
      }

      // ── Render por TAREA ──
      if (histGroupBy === 'tarea') {
        const byTarea = {};
        list.forEach(a => { if (!byTarea[a.tarea]) byTarea[a.tarea]=[]; byTarea[a.tarea].push(a); });

        // Ordenar tareas por tiempo total descendente
        const tareasSorted = Object.keys(byTarea).sort((a,b) => {
          const minA = byTarea[a].reduce((s,x)=>s+Math.max(0,toMin(x.horaFin)-toMin(x.horaInicio)),0);
          const minB = byTarea[b].reduce((s,x)=>s+Math.max(0,toMin(x.horaFin)-toMin(x.horaInicio)),0);
          return minB - minA;
        });

        let html = '';
        tareasSorted.forEach(tareaId => {
          const rows   = byTarea[tareaId];
          const t      = tareas.find(x => x.id === tareaId);
          const tarMin = rows.reduce((s,a)=>s+Math.max(0,toMin(a.horaFin)-toMin(a.horaInicio)),0);
          const veces  = rows.length;

          html += `
            <div class="hist-day-group">
              <div class="hist-task-header">
                <div class="hist-task-header-icon">${t?.icon||'📋'}</div>
                <div class="hist-task-header-info">
                  <div class="hist-task-header-name">${esc(t?.nombre||'Tarea')}</div>
                  <div class="hist-task-header-sub">${veces} vez${veces!==1?'':'es'} · ${formatDur(tarMin)} en total</div>
                </div>
                <div class="hist-task-header-total">${formatDur(tarMin)}</div>
              </div>
              <div class="hist-day-rows">
                ${rows.map(a => histRow(a, false)).join('')}
              </div>
            </div>`;
        });
        document.getElementById('histContent').innerHTML = html;
        return;
      }

      // ── Render por FECHA ──
      const byDate = {};
      list.forEach(a => { if (!byDate[a.fecha]) byDate[a.fecha]=[]; byDate[a.fecha].push(a); });
      const today = todayStr();
      let html = '';

      Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).forEach(fecha => {
        const rows    = byDate[fecha];
        const dayMin  = rows.reduce((s,a)=>s+Math.max(0,toMin(a.horaFin)-toMin(a.horaInicio)),0);
        const rawDate = new Date(fecha + 'T12:00:00');
        const label   = fecha === today
          ? 'Hoy — ' + rawDate.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})
          : rawDate.toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});

        html += `
          <div class="hist-day-group">
            <div class="hist-day-header">
              <span class="hist-day-label">📅 ${label}</span>
              <span class="hist-day-total">${formatDur(dayMin)} total del día</span>
            </div>
            <div class="hist-day-rows">
              ${rows.map(a => histRow(a, true)).join('')}
            </div>
          </div>`;
      });
      document.getElementById('histContent').innerHTML = html;
    }

    function doLogin() {
      const user = document.getElementById('loginUser').value.trim().toLowerCase();
      const pass = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';

      if (!user || !pass) {
        errEl.textContent = 'Completa usuario y contraseña';
        errEl.style.display = 'block'; return;
      }

      if (user === 'admin' && pass === adminPass) {
        currentSession = { type: 'admin' };
        sessionStorage.setItem('tf_session', JSON.stringify(currentSession));
        showAdminView(); return;
      }

      const persona = personas.find(p =>
        p.username && p.username.toLowerCase() === user && p.password === pass
      );
      if (persona) {
        currentSession = { type: 'employee', personaId: persona.id };
        sessionStorage.setItem('tf_session', JSON.stringify(currentSession));
        showEmployeeView(persona.id); return;
      }

      errEl.textContent = 'Usuario o contraseña incorrectos';
      errEl.style.display = 'block';
      document.getElementById('loginPass').value = '';
    }

    function renderEmployeeApp(personaId) {
      const p = personas.find(x => x.id === personaId);
      if (!p) { doLogout(); return; }

      // Header
      const av = document.getElementById('empAvatar');
      av.style.background = p.color;
      av.textContent = ini(p.nombre);
      document.getElementById('empName').textContent = p.nombre;

      // Saludo según hora
      const h = new Date().getHours();
      const saludo = h < 12 ? 'Buenos días' : h < 18 ? 'Buenas tardes' : 'Buenas noches';
      document.getElementById('empGreeting').textContent = saludo + ',';
      document.getElementById('empDateTitle').textContent = nombreCorto(p.nombre);
      document.getElementById('empDateSub').textContent = new Date().toLocaleDateString('es-CO', {
        weekday:'long', day:'numeric', month:'long'
      });

      // Tareas
      const list = asignaciones
        .filter(a => a.personaId === personaId && esDeHoy(a))
        .sort((a,b) => toMin(a.horaInicio) - toMin(b.horaInicio));

      const el = document.getElementById('empTaskList');

      if (!list.length) {
        el.innerHTML = `
          <div class="emp-empty">
            <div class="emp-empty-icon">📋</div>
            <div class="emp-empty-text">No tienes tareas asignadas para hoy</div>
          </div>`;
        return;
      }

      const enCurso  = list.filter(a => asigStatus(a) === 'en-curso');
      const proximas = list.filter(a => asigStatus(a) === 'pendiente');
      const hechas   = list.filter(a => asigStatus(a) === 'terminada');

      function renderEmpRow(a) {
        const t = tareas.find(x => x.id === a.tarea);
        const st = asigStatus(a);
        const stripeColor = st==='en-curso' ? '#D97706' : st==='pendiente' ? '#2563EB' : '#CCC';
        const badge = st==='en-curso'
          ? `<span class="tc-badge badge-en-curso">🟠 En curso</span>`
          : st==='pendiente'
          ? `<span class="tc-badge badge-pendiente">🔵 Próximo</span>`
          : `<span class="tc-badge badge-terminada">✅ Completado</span>`;
        const pct = st==='en-curso' ? progressPct(a.horaInicio, a.horaFin) : (st==='terminada' ? 100 : 0);
        const barColor = st==='en-curso' ? '#D97706' : '#22C55E';
        const rem = st==='en-curso' ? timeRemaining(a.horaInicio, a.horaFin) : null;

        return `
          <div class="emp-task-card ${st}">
            <div class="emp-tc-stripe" style="background:${stripeColor};"></div>
            <div class="emp-tc-top">
              <div class="emp-tc-icon">${t?.icon||'📋'}</div>
              <div class="emp-tc-name">${esc(t?.nombre||'Tarea')}</div>
              ${badge}
            </div>
            <div class="emp-tc-time">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              ${fmt(a.horaInicio)} → ${fmt(a.horaFin)}
            </div>
            ${a.detalle ? `<div class="emp-tc-detalle">${esc(a.detalle)}</div>` : ''}
            ${st !== 'pendiente' ? `
              <div class="emp-tc-progress">
                <div class="emp-tc-progress-fill" style="width:${pct.toFixed(1)}%;background:${barColor};"></div>
              </div>` : ''}
            ${rem ? `<div class="emp-tc-remaining">⏱ ${rem}</div>` : ''}
          </div>`;
      }

      let html = '';
      if (enCurso.length)  html += `<div class="emp-section-label">En curso ahora</div>${enCurso.map(renderEmpRow).join('')}`;
      if (proximas.length) html += `<div class="emp-section-label">Próximas</div>${proximas.map(renderEmpRow).join('')}`;
      if (hechas.length)   html += `<div class="emp-section-label">Completadas</div>${hechas.map(renderEmpRow).join('')}`;
      el.innerHTML = html;
    }

    function initApp() {
      const stored = sessionStorage.getItem('tf_session');
      if (stored) {
        try {
          const sess = JSON.parse(stored);
          if (sess.type === 'admin') { currentSession = sess; showAdminView(); return; }
          if (sess.type === 'tablero') { currentSession = sess; showTableroView(); return; }
          if (sess.type === 'employee') {
            const p = personas.find(x => x.id === sess.personaId);
            if (p) { currentSession = sess; showEmployeeView(p.id); return; }
          }
        } catch(e) {}
      }
    }

    // ══ BOARD VIEW ═══════════════════════════════════════════════
    function openBoard() {
      document.getElementById('boardView').classList.add('show');
      renderBoard();
    }

    function showTableroView() {
      currentSession = { type: 'tablero' };
      sessionStorage.setItem('tf_session', JSON.stringify(currentSession));
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminApp').classList.remove('active');
      document.getElementById('employeeApp').classList.remove('active');
      document.getElementById('boardView').classList.add('show');
      renderBoard();
      document.getElementById('boardView').requestFullscreen().catch(()=>{});
    }

    function closeBoard() {
      if (currentSession?.type === 'tablero') { doLogout(); return; }
      document.getElementById('boardView').classList.remove('show');
      if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    }

    function toggleBoardFullscreen() {
      if (!document.fullscreenElement) {
        document.getElementById('boardView').requestFullscreen().catch(()=>{});
      } else {
        document.exitFullscreen().catch(()=>{});
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !document.fullscreenElement) {
        if (document.getElementById('boardView').classList.contains('show')) closeBoard();
      }
    });

    function renderBoard() {
      const boardEl = document.getElementById('boardView');
      if (!boardEl.classList.contains('show')) return;

      // Stats header
      const ocupados = personas.filter(p => personaBusy(p.id)).length;
      const enCursoN = asignaciones.filter(a => esDeHoy(a) && asigStatus(a) === 'en-curso').length;
      document.getElementById('boardStats').innerHTML = `
        <div class="board-hstat">👥 <strong>${personas.length}</strong> personas</div>
        <div class="board-hstat">🟠 <strong>${ocupados}</strong> ocupados</div>
        <div class="board-hstat">🟢 <strong>${personas.length - ocupados}</strong> libres</div>
        <div class="board-hstat">⚡ <strong>${enCursoN}</strong> en curso</div>`;
      document.getElementById('boardDate').textContent = new Date().toLocaleDateString('es-CO',{
        weekday:'long', day:'numeric', month:'long'
      });

      // Build card data per task
      const cards = tareas.map(t => {
        const all = asignaciones.filter(a => a.tarea === t.id && esDeHoy(a));
        const activos  = all.filter(a => asigStatus(a) === 'en-curso');
        const proximos = all.filter(a => asigStatus(a) === 'pendiente')
                            .sort((a,b) => toMin(a.horaInicio) - toMin(b.horaInicio));
        const hechos   = all.filter(a => asigStatus(a) === 'terminada');

        let st, display, refAsig;
        if (activos.length)  { st = 'en-curso';  display = activos;  refAsig = activos[0]; }
        else if (proximos.length) { st = 'pendiente'; display = [proximos[0]]; refAsig = proximos[0]; }
        else if (hechos.length)   { st = 'terminada'; display = hechos; refAsig = hechos[0]; }
        else                      { st = 'libre';     display = [];    refAsig = null; }

        return { t, st, display, refAsig };
      }).sort((a, b) => {
        const ord = { 'en-curso':0, 'pendiente':1, 'terminada':2, 'libre':3 };
        return ord[a.st] - ord[b.st];
      });

      document.getElementById('boardGrid').innerHTML = cards.map(({ t, st, display, refAsig }) => {
        if (st === 'libre') {
          return `
            <div class="board-card bc-libre">
              <div class="bc-top">
                <div class="bc-icon">${t.icon}</div>
                <div class="bc-name">${esc(t.nombre)}</div>
              </div>
              <span class="bc-badge bc-badge-libre">🟢 Libre</span>
            </div>`;
        }

        const badge = st === 'en-curso'
          ? `<span class="bc-badge bc-badge-curso">🟠 En curso</span>`
          : st === 'pendiente'
          ? `<span class="bc-badge bc-badge-pending">🔵 Próximo</span>`
          : `<span class="bc-badge bc-badge-done">✅ Completado</span>`;

        const personsHtml = display.map(a => {
          const p = personas.find(x => x.id === a.personaId);
          if (!p) return '';
          return `<div class="bc-person">
            <div class="bc-av" style="background:${p.color}">${ini(p.nombre)}</div>
            <div class="bc-person-info">
              <span class="bc-pname">${esc(p.nombre)}</span>
              ${a.detalle ? `<span class="bc-pdetalle">${esc(a.detalle)}</span>` : ''}
            </div>
          </div>`;
        }).join('');

        const pct = st === 'en-curso'
          ? progressPct(refAsig.horaInicio, refAsig.horaFin)
          : st === 'terminada' ? 100 : 0;
        const barColor = st === 'en-curso' ? '#D97706' : '#22C55E';
        const rem = st === 'en-curso' ? timeRemaining(refAsig.horaInicio, refAsig.horaFin) : null;

        return `
          <div class="board-card bc-${st}">
            <div class="bc-top">
              <div class="bc-icon">${t.icon}</div>
              <div class="bc-name">${esc(t.nombre)}</div>
            </div>
            ${badge}
            <div class="bc-persons">
              ${personsHtml}
            </div>
            <div class="bc-time">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
              ${fmt(refAsig.horaInicio)} → ${fmt(refAsig.horaFin)}
            </div>
            ${st !== 'pendiente' ? `
              <div class="bc-bar">
                <div class="bc-bar-fill" style="width:${pct.toFixed(1)}%;background:${barColor};"></div>
              </div>` : ''}
            ${rem ? `<div class="bc-remaining">⏱ ${rem}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ══ ARRANQUE Y TICKER ════════════════════════════════════════
    updateClock();
    setInterval(updateClock, 1000);

    // Refresco automático de estados (pendiente→en-curso→terminada).
    // Se sincroniza al próximo minuto exacto y luego dispara cada 60 s.
    function startRenderTicker() {
      const tick = () => {
        if (currentSession?.type === 'admin') {
          const enHistorial = document.getElementById('tabHistorial')?.classList.contains('active');
          if (!enHistorial) renderAll();
        } else if (currentSession?.type === 'employee') {
          renderEmployeeApp(currentSession.personaId);
        }
        renderBoard();
      };
      const now = new Date();
      const msToNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds() + 50;
      setTimeout(() => { tick(); setInterval(tick, 60000); }, msToNextMinute);
    }
    startRenderTicker();

    // Carga inicial + escucha en tiempo real
    (async () => {
      const loadingEl = document.createElement('div');
      loadingEl.id = 'fb-loading';
      loadingEl.style.cssText = 'position:fixed;inset:0;background:#0C0705;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;';
      loadingEl.innerHTML = '<div style="width:36px;height:36px;border:3px solid #2E2013;border-top-color:#9A3412;border-radius:50%;animation:spin 0.7s linear infinite"></div><div style="color:#8A7458;font-family:DM Sans,sans-serif;font-size:13px;">Conectando…</div>';
      document.body.appendChild(loadingEl);

      const state = await loadState();
      personas     = state.personas     || [];
      asignaciones = state.asignaciones || [];
      adminPass    = state.adminPass    || 'admin123';
      tareas       = state.tareas;
      if (!tareas || !tareas.length) tareas = DEFAULT_TAREAS.map(t => ({...t}));

      loadingEl.remove();
      initApp();

      // Escuchar cambios en tiempo real (ignorar arranque y ecos de nuestras propias escrituras)
      let primerDisparo = true;
      STATE_DOC.onSnapshot((snap) => {
        if (primerDisparo) { primerDisparo = false; return; }
        if (Date.now() - _lastWriteTime < 3000) return; // eco de saveState propio
        if (!snap.exists) return;
        const d = snap.data();
        personas     = d.personas     || [];
        asignaciones = d.asignaciones || [];
        adminPass    = d.adminPass    || 'admin123';
        tareas       = d.tareas;
        if (!tareas || !tareas.length) tareas = DEFAULT_TAREAS.map(t => ({...t}));

        if (currentSession?.type === 'admin') {
          const enHistorial = document.getElementById('tabHistorial')?.classList.contains('active');
          if (enHistorial) renderHistorial(); else renderAll();
        } else if (currentSession?.type === 'employee') {
          renderEmployeeApp(currentSession.personaId);
        }
        renderBoard();
      });
    })();
  </script>
</body>
</html>
